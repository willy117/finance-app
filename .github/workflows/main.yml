name: Deploy to GitHub Pages

on:
  push:
    branches: ['main'] # 如果您的主要分支名稱是 master，請將這裡改為 master

# 設定 GitHub Actions 所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 確保同一時間只有一個部署在進行，避免衝突
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        # 在這裡將 GitHub Secrets 注入為環境變數，讓 Vite 打包時可以讀取到
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VITE_FINNHUB_API_KEY: ${{ secrets.VITE_FINNHUB_API_KEY }}
          VITE_GOOGLE_SHEETS_WEB_APP_URL: ${{ secrets.VITE_GOOGLE_SHEETS_WEB_APP_URL }}
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite 預設的打包輸出目錄
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
